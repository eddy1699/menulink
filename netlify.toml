[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[context.production]
  environment = { NODE_VERSION = "20" }

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "IZIPAY_API_URL,IZIPAY_MODE,IZIPAY_USERNAME,IZIPAY_TEST_PASSWORD,IZIPAY_PROD_PASSWORD,IZIPAY_HMAC_TEST,IZIPAY_HMAC_PROD,NEXT_PUBLIC_IZIPAY_PUBLIC_KEY_TEST,NEXT_PUBLIC_IZIPAY_PUBLIC_KEY_PROD,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,SUPABASE_SERVICE_ROLE_KEY,DATABASE_URL"
